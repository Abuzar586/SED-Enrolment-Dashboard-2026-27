name: Fetch SIS Enrollment Data

on:
  schedule:
    - cron: '0 1 * * *'  # Runs at 6:00 AM Pakistan time (1:00 AM UTC)
  workflow_dispatch:       # Also allows manual trigger anytime

permissions:
  contents: write

jobs:
  fetch-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Create data directory
        run: mkdir -p data

      - name: Download enrollment data from SIS
        run: |
          curl -L "https://sis.pesrp.edu.pk/dashboard/download_schools_progress_stats" \
            -o data/current.csv \
            --retry 3 \
            --retry-delay 10 \
            --max-time 120

      - name: Save last updated timestamp
        run: |
          echo "$(TZ='Asia/Karachi' date '+%d %B %Y at %I:%M %p PKT')" > data/last_updated.txt

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/current.csv data/last_updated.txt
          git diff --staged --quiet || git commit -m "Auto-update: SIS enrollment data $(date '+%Y-%m-%d')"
          git push
